<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱你</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #fff5f7;
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  }
  .heart {
    width: 200px;
    height: 200px;
    animation: beat 1.4s ease-in-out infinite;
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    30% { transform: scale(1.12); }
    60% { transform: scale(0.95); }
  }
  .msg {
    margin-top: 32px;
    font-size: 22px;
    color: #c0385a;
    letter-spacing: 3px;
    animation: fadein 1.8s ease forwards;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <svg class="heart" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
    <path d="M50,80 C50,80 5,50 5,25 C5,10 15,2 27,2 C36,2 44,7 50,14 C56,7 64,2 73,2 C85,2 95,10 95,25 C95,50 50,80 50,80Z" fill="#e85b7a"/>
  </svg>
  <p class="msg">宝贝，今年依旧爱你。</p>
</body>
</html>
